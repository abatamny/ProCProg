services:
  app:
    build:
      context: .
      target: runtime
    image: place-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/place-app.sqlite
      MEDIA_PATH: /app/media
      CLIENT_DIST_PATH: /app/client/dist
      ENABLE_STAGE1_HARNESS: "0"
      TLS_KEY_PATH: ""
      TLS_CERT_PATH: ""
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?Set SITE_ADDRESS in .env}
      TLS_MODE: ${TLS_MODE:-domain_tls}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
